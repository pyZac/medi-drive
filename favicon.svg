<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B3D91"/>
      <stop offset="100%" style="stop-color:#00A5E0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Lab flask / droplet icon -->
  <g fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Stem of flask -->
    <line x1="32" y1="10" x2="32" y2="28"/>
    <!-- Flask opening handles -->
    <line x1="24" y1="14" x2="40" y2="14"/>
    <!-- Flask body (droplet shape pointing down) -->
    <path d="M22 28 C14 36 14 50 32 54 C50 50 50 36 42 28 Z"/>
  </g>
  <!-- Inner circle dot -->
  <circle cx="32" cy="42" r="5" fill="white" opacity="0.9"/>
</svg>
